<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0e14;
    --bg-soft:#121723;
    --panel:#161c2b;
    --panel-2:#1c2436;
    --line:#26314a;
    --txt:#e8edf7;
    --txt-dim:#8b97b0;
    --txt-faint:#5d6783;
    --accent:#5ad1a5;
    --accent-dim:#2f6f5a;
    --bull:#43c08a;
    --bear:#e5675f;
    --warn:#e8b85c;
    --radius:16px;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #16243a 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #16312a 0%, transparent 55%),
      var(--bg);
    color:var(--txt);
    min-height:100vh;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 120px;}

  /* Header */
  header{
    position:sticky;top:0;z-index:30;
    padding:max(env(safe-area-inset-top),14px) 16px 12px;
    margin:0 -16px 8px;
    background:linear-gradient(180deg, rgba(11,14,20,.96) 60%, rgba(11,14,20,0));
    backdrop-filter:blur(8px);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .brand .sub{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-left:auto;letter-spacing:.04em;}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-top:14px;}
  .tab{
    flex:1;text-align:center;padding:10px 4px;border-radius:12px;
    background:var(--bg-soft);border:1px solid transparent;
    color:var(--txt-dim);font-size:13px;font-weight:700;cursor:pointer;
    transition:.18s;user-select:none;
  }
  .tab .cnt{display:block;font-family:var(--mono);font-size:10px;color:var(--txt-faint);margin-top:2px;font-weight:500;}
  .tab.active{background:var(--panel-2);border-color:var(--line);color:var(--txt);}
  .tab.active .cnt{color:var(--accent);}
  /* Sector filter bar */
  .sector-bar{display:flex;gap:6px;overflow-x:auto;margin-top:12px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .sector-bar::-webkit-scrollbar{display:none;}
  .schip{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--txt-dim);background:var(--panel);border:1px solid var(--line);padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .schip.on{background:rgba(90,209,165,.13);border-color:var(--accent-dim);color:var(--accent);}
  /* sector chip on card / detail */
  .card .sector-chip{font-size:10px;font-weight:700;color:var(--accent);background:rgba(90,209,165,.10);border:1px solid var(--accent-dim);padding:3px 8px;border-radius:20px;margin-right:6px;}
  .dv-head .sector-chip{font-size:11px;font-weight:700;color:var(--accent);background:rgba(90,209,165,.12);border:1px solid var(--accent-dim);padding:4px 10px;border-radius:20px;white-space:nowrap;margin-right:6px;}
  .sector-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .sector-pick .opt{padding:8px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--txt-dim);cursor:pointer;}
  .sector-pick .opt.on{background:rgba(90,209,165,.12);border-color:var(--accent-dim);color:var(--accent);}
  /* chart button in detail */
  .chart-btn{width:100%;margin:14px 0 4px;padding:13px;border-radius:12px;background:linear-gradient(135deg,rgba(90,209,165,.18),rgba(90,209,165,.06));border:1px solid var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .chart-btn:active{transform:scale(.98);}
  /* 자료 목록 (제목 + 날짜) */
  .doc-cat-title{font-size:12px;font-weight:800;color:var(--txt-faint);letter-spacing:.04em;margin:20px 2px 8px;text-transform:uppercase;}
  .doc{display:flex;align-items:center;gap:10px;padding:15px 14px;border:1px solid var(--line);border-radius:13px;background:var(--panel);margin-bottom:8px;cursor:pointer;transition:.15s;}
  .doc:active{background:var(--panel-2);transform:scale(.99);}
  .doc-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none;}
  .doc.bull .doc-dot{background:var(--bull);} .doc.bear .doc-dot{background:var(--bear);} .doc.check .doc-dot{background:var(--warn);}
  .doc-main{flex:1;min-width:0;}
  .doc-title{font-size:15px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .doc-date{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-top:2px;}
  .doc-arrow{font-size:15px;color:var(--txt-faint);flex:none;}
  /* 기본 정보 (바로 펼쳐 보이는 카드) */
  .info-block{border:1px solid var(--line);border-radius:13px;background:var(--panel);padding:14px;margin-bottom:8px;}
  .info-block h3{margin:0 0 6px;font-size:14.5px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:7px;}
  .info-block h3::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .info-block h3 .ib-date{margin-left:auto;font-size:11px;font-weight:500;color:var(--txt-faint);font-family:var(--mono);}
  .info-block h3 .ib-date::before{content:none;}
  .info-block h3 .ib-pre{font-size:11px;font-weight:600;color:var(--accent);font-family:var(--mono);background:rgba(90,209,165,.12);padding:2px 7px;border-radius:6px;}
  .info-block h3 .ib-pre::before{content:none;}
  .info-block.bull h3{color:var(--bull);} .info-block.bull h3::before{background:var(--bull);}
  .info-block.bear h3{color:var(--bear);} .info-block.bear h3::before{background:var(--bear);}
  .info-block.check h3{color:var(--warn);} .info-block.check h3::before{background:var(--warn);}
  .info-block p{margin:0;font-size:14px;line-height:1.65;color:var(--txt);white-space:pre-wrap;}
  /* 내용 팝업 (자료 클릭 시) — 차트 팝업과 동일한 모달 시스템 재사용 */
  .doc-modal{position:fixed;inset:0;z-index:70;background:rgba(5,7,11,.78);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;}
  .doc-modal.show{display:block;}
  .dm-scroll{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:60px 0 0;}
  @media(min-width:680px){.dm-scroll{padding:40px 20px;}}
  .dm-card{width:100%;max-width:680px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:18px 18px calc(env(safe-area-inset-bottom) + 60px);min-height:50vh;}
  @media(min-width:680px){.dm-card{border-radius:20px;padding-bottom:28px;min-height:0;}}
  .dm-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .dm-title{font-size:18px;font-weight:800;flex:1;}
  .dm-date{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-bottom:16px;}
  .dm-close{font-size:24px;line-height:1;color:var(--txt-dim);background:none;border:none;cursor:pointer;padding:0 4px;flex:none;}
  .dm-body{font-size:15px;line-height:1.7;color:var(--txt);white-space:pre-wrap;}
  /* chart modal */
  .chart-modal{position:fixed;inset:0;z-index:60;background:rgba(5,7,11,.78);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;}
  .chart-modal.show{display:block;}
  .cm-scroll{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:60px 0 0;}
  @media(min-width:680px){.cm-scroll{padding:40px 20px;}}

</head>

                        "mid": "거래대금 30조대 등락. 고배당(3.9%)+자사주 소각이 하방 방어. PBR 0.55 박스권.",
                        "bear": "거래대금 30조 아래 둔화(피크아웃) + 반대매매 + 증시 조정. 고베타라 낙폭 큼. 저점(3,265) 방향."

            "outlook": [
                  {
                        id: uid(),
                        ts: 1780390686560,
                        "title": "시장을 증폭하는 고베타주 (12개월 시나리오)",
                        "body": "강세(~7,500)=거래대금 40조+ 지속+2분기 실적 상회 / 기본(~5,600)=거래대금 30조대 등락, 고배당이 하방방어, 박스권 / 약세(~3,800)=거래대금 둔화+반대매매+증시조정(고베타라 낙폭 큼). 안정적 핵심은 한국금융지주가 더 합리적."
                  }
            ],
            updatedAt: 1780425195145
      }
];
  }

  // 항상 최신 내장 데이터를 보여줌 (클로드가 수정 → index.html 하나만 교체)
  var companies = normalize(seed());

  /* ---------- helpers ---------- */
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]; }); }
  function $(id){ return document.getElementById(id); }

  function counts(){
    var c = { large:0, mid:0, small:0 };
    for(var i=0;i<companies.length;i++){ if(c[companies[i].tier]!=null) c[companies[i].tier]++; }
    return c;
  }

  /* ---------- sector filter bar ---------- */
  function renderSectorBar(){
    var bar = $("sectorBar");
    if(!bar) return;
    // 현재 tier에 존재하는 섹터만 칩으로 (+ 전체)
    var inTier = companies.filter(function(c){ return c.tier===state.tier; });
    var present = {};
    inTier.forEach(function(c){ present[c.sector||"기타"] = (present[c.sector||"기타"]||0)+1; });
    var list = ["전체"].concat(SECTORS.filter(function(s){ return present[s]; }));
    if(list.indexOf(state.sector) < 0) state.sector = "전체";
    bar.innerHTML = "";
    list.forEach(function(s){
      var chip = document.createElement("div");
      chip.className = "schip" + (s===state.sector ? " on" : "");
      chip.textContent = s==="전체" ? ("전체 "+inTier.length) : (s+" "+present[s]);
      chip.addEventListener("click", function(){ state.sector = s; render(); });
      bar.appendChild(chip);
    });
  }

  /* ---------- render list ---------- */
  function render(){
    var c = counts();
    $("c-large").textContent = c.large;
    $("c-mid").textContent = c.mid;
    $("c-small").textContent = c.small;
    $("totalCount").textContent = companies.length + " 종목";

    renderSectorBar();

    var q = state.search.trim().toLowerCase();
    var rows = companies.filter(function(x){
      if(x.tier !== state.tier) return false;
      if(state.sector !== "전체" && (x.sector||"기타") !== state.sector) return false;
      if(!q) return true;
      return (x.name||"").toLowerCase().indexOf(q) >= 0 || (x.ticker||"").toLowerCase().indexOf(q) >= 0;
    });

    // 새로 추가/업데이트한 종목이 맨 위로 (updatedAt 최신순)
    rows.sort(function(a,b){
      return (b.updatedAt || 0) - (a.updatedAt || 0);
    });

    var list = $("list");
    list.innerHTML = "";
    if(rows.length === 0){ $("empty").style.display = "block"; return; }
    $("empty").style.display = "none";

    rows.forEach(function(x){
      var el = document.createElement("div");
      el.className = "card";
      el.innerHTML =
        '<div class="top"><span class="nm">'+esc(x.name)+'</span>'+
        (x.ticker ? '<span class="tk">'+esc(x.ticker)+'</span>' : '')+
        '<span class="sector-chip" style="margin-left:auto;">'+esc(x.sector||"기타")+'</span>'+
        '<span class="tier-chip">'+TIER_LABEL[x.tier]+'</span></div>'+
        (x.summary ? '<div class="sm">'+esc(x.summary)+'</div>' : '');
      el.addEventListener("click", function(){ openDetail(x.id); });
      list.appendChild(el);
    });
  }

  /* ---------- sheets ---------- */
  function openSheet(node){ $("scrim").classList.add("show"); node.classList.add("show"); }
  function closeSheets(){
    $("scrim").classList.remove("show");
    $("detailSheet").classList.remove("show");
    var ds = $("detailSheet");
    ds.style.transform = ""; ds.style.opacity = ""; ds.style.transition = "";
  }

  /* ---------- detail ---------- */
  function secClass(title){
    if(title.indexOf("강세")>=0) return "bull";
    if(title.indexOf("약세")>=0) return "bear";
    if(title.indexOf("체크")>=0) return "check";
    return "";
  }
  function fmtDate(ts){
    var d = new Date(ts || Date.now());
    var p = function(n){ return (n<10?"0":"")+n; };
    return d.getFullYear()+"."+p(d.getMonth()+1)+"."+p(d.getDate());
  }

  function openDetail(id){
    state.editingId = id;
    state.olAdding = false;
    if(!companies.find(function(c){ return c.id===id; })) return;
    renderDetail();
    openSheet($("detailSheet"));
  }

  // ===== 탭 정의: 카테고리를 4개 탭으로 매핑 =====
  // 개요(기본정보) / 분석(전망·체크+시나리오차트) / 호재·악재 / 메모
  function tabOf(title){
    if(/강세|호재|장점|약세|악재|단점|리스크|위험/.test(title)) return "news";
    if(/체크|전망|시나리오/.test(title)) return "analysis";
    return "overview";
  }
  function secClassOf(title){ return secClass(title||""); }

  var DETAIL_TABS = [
    {key:"overview", label:"개요"},
    {key:"analysis", label:"분석·시나리오"},
    {key:"news",     label:"호재·악재"},
    {key:"memo",     label:"메모"}
  ];
  var _curTab = "overview";
  var _curStock = null;

  function renderDetail(){
    var id = state.editingId;
    var x = companies.find(function(c){ return c.id===id; });
    if(!x) return;
    _curStock = x;
    _curTab = "overview";

    // 고정 헤더: 기업명·코드·섹터·분류 + 요약
    $("detailFixed").innerHTML =
      '<div class="dv-head"><div><div class="nm">'+esc(x.name)+'</div>'+
      (x.ticker?'<div class="tk">'+esc(x.ticker)+'</div>':'')+'</div>'+
      '<span class="sector-chip">'+esc(x.sector||"기타")+'</span>'+
      '<span class="chip">'+TIER_LABEL[x.tier]+'</span></div>'+
      (x.summary?'<div class="dv-summary">'+esc(x.summary)+'</div>':'');

    // 탭바
    var tabsHtml = "";
    DETAIL_TABS.forEach(function(t){
      tabsHtml += '<button class="sheet-tab'+(t.key===_curTab?" on":"")+'" data-tab="'+t.key+'">'+esc(t.label)+'</button>';
    });
    $("detailTabs").innerHTML = tabsHtml;
    var tabBtns = $("detailTabs").querySelectorAll(".sheet-tab");
    for(var i=0;i<tabBtns.length;i++){
      tabBtns[i].addEventListener("click", function(){
        _curTab = this.getAttribute("data-tab");
        var bs = $("detailTabs").querySelectorAll(".sheet-tab");
        for(var j=0;j<bs.length;j++){ bs[j].classList.toggle("on", bs[j].getAttribute("data-tab")===_curTab); }
        renderTabBody();
        $("detailBody").scrollTop = 0;
      });
    }

    renderTabBody();
  }

  // 선택된 탭의 내용만 본문에 렌더
  // 한 탭에 속하는 "누적 항목"을 날짜 최신순으로 모음
  // 항목 소스: sections(고정·날짜선택) + outlook(메모/누적)
  function entriesFor(x, tabKey){
    var items = [];
    (x.sections||[]).forEach(function(s){
      if(tabOf(s.title||"") !== tabKey) return;
      items.push({ title:s.title||"", body:s.body||"", ts:(s.ts||s.date||null), cls:secClassOf(s.title) });
    });
    (x.outlook||[]).forEach(function(o){
      var t = o.tab || "memo";  // 항목에 tab 지정 가능, 없으면 memo
      if(t !== tabKey) return;
      items.push({ title:o.title||"", body:o.body||"", ts:(o.ts||null), cls:"" });
    });
    // 날짜 최신순 (ts 있는 것 우선, 큰 값이 위로)
    items.sort(function(a,b){
      var ta = a.ts? (typeof a.ts==="number"? a.ts : Date.parse(a.ts)||0) : 0;
      var tb = b.ts? (typeof b.ts==="number"? b.ts : Date.parse(b.ts)||0) : 0;
      return tb - ta;
    });
    return items;
  }

  function entryCard(it){
    var dateStr = it.ts ? fmtDate(it.ts) : "";
    return '<div class="info-block '+(it.cls||"")+'">'+
      '<h3>'+(dateStr?'<span class="ib-pre">'+esc(dateStr)+'</span> ':'')+esc(it.title||"")+'</h3>'+
      (it.body?'<p>'+esc(it.body)+'</p>':'')+'</div>';
  }

  function renderTabBody(){
    var x = _curStock; if(!x) return;
    var html = "";

    if(_curTab === "overview"){
      // 기본 정보(개요·기술력·실적) — 고정, 날짜 없음
      (x.sections||[]).forEach(function(s){
        if(tabOf(s.title||"") !== "overview") return;
        if(!s.body && !s.title) return;
        html += '<div class="info-block '+secClassOf(s.title)+'"><h3>'+esc(s.title||"")+'</h3><p>'+esc(s.body||"")+'</p></div>';
      });
      if(!html) html = emptyMsg("개요 정보가 없어요.");
    }
    else if(_curTab === "analysis"){
      // 시나리오 차트 버튼은 항상 맨 위 고정
      if(x.chart){
        html += '<button class="chart-btn" id="openChart">\uD83D\uDCC8 12개월 시나리오 차트 보기</button>';
      }
      // 분석 항목 누적 — 최신순(새 게 위)
      var items = entriesFor(x, "analysis");
      items.forEach(function(it){ html += entryCard(it); });
      if(!x.chart && !items.length) html = emptyMsg("분석 자료가 없어요.");
    }
    else if(_curTab === "news"){
      var items = entriesFor(x, "news");
      items.forEach(function(it){ html += entryCard(it); });
      if(!items.length) html = emptyMsg("호재·악재 정보가 없어요.");
    }
    else if(_curTab === "memo"){
      var items = entriesFor(x, "memo");
      items.forEach(function(it){ html += entryCard(it); });
      if(!items.length) html = emptyMsg("메모가 없어요.");
    }

    $("detailBody").innerHTML = html;

    var cb = $("openChart");
    if(cb){ cb.addEventListener("click", function(){ openChart(x); }); }
  }

  function emptyMsg(t){
    return '<div style="text-align:center;color:var(--txt-faint);font-size:13px;padding:40px 0;">'+esc(t)+'</div>';
  }

  /* ---------- chart popup ---------- */
  var cmChart = null;
  function openChart(x){
    if(!x.chart) return;
    var ch = x.chart;
    $("cmTitle").textContent = x.name + " 시나리오";
    $("cmSub").textContent = (ch.span || "조건부 경로") + " · 기준 " + fmtNum(ch.base, ch.unit);

    var labels = ch.labels;
    var colors = { bull:"#43c08a", mid:"#e8b85c", bear:"#e5675f" };
    var datasets = [
      mkDataset("강세", ch.bull, colors.bull),
      mkDataset("기본", ch.mid, colors.mid),
      mkDataset("약세", ch.bear, colors.bear)
    ];

    if(cmChart){ cmChart.destroy(); cmChart = null; }
    var ctx = $("cmCanvas").getContext("2d");
    cmChart = new Chart(ctx, {
      type:"line",
      data:{ labels:labels, datasets:datasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{ legend:{ display:false },
          tooltip:{ backgroundColor:"#1c2436", borderColor:"#26314a", borderWidth:1, padding:10, cornerRadius:8,
            callbacks:{ label:function(c){ return " "+c.dataset.label+": "+fmtNum(c.parsed.y, ch.unit); } } } },
        scales:{
          y:{ grid:{ color:"#1a2030" }, border:{ display:false },
            ticks:{ color:"#8b97b0", font:{ size:10 }, callback:function(v){ return fmtNum(v, ch.unit, true); } } },
          x:{ grid:{ display:false }, border:{ color:"#26314a" }, ticks:{ color:"#8b97b0", font:{ size:9 } } }
        }
      }
    });

    // legend (확률 + 목표가)
    var ends = { bull: ch.bull[ch.bull.length-1], mid: ch.mid[ch.mid.length-1], bear: ch.bear[ch.bear.length-1] };
    var prob = ch.prob || {};
    var names = [["강세",colors.bull,ends.bull,0,prob.bull],["기본",colors.mid,ends.mid,1,prob.mid],["약세",colors.bear,ends.bear,2,prob.bear]];
    var lg = $("cmLegend"); lg.innerHTML = "";
    names.forEach(function(n){
      var b = document.createElement("div"); b.className = "cm-lg";
      var probTxt = (n[4]!=null) ? '<span class="pct">'+n[4]+'%</span>' : '';
      b.innerHTML = '<span class="d" style="background:'+n[1]+'"></span><span class="n">'+n[0]+'</span>'+probTxt+'<span class="p">'+fmtNum(n[2], ch.unit)+'</span>';
      b.addEventListener("click", function(){
        var meta = cmChart.getDatasetMeta(n[3]); meta.hidden = !meta.hidden;
        b.classList.toggle("off", meta.hidden); cmChart.update();
      });
      lg.appendChild(b);
    });

    // reasons (확률 포함)
    var r = ch.reasons || {};
    var p = ch.prob || {};
    function pl(k){ return p[k]!=null ? ' <span style="opacity:.7">'+p[k]+'%</span>' : ''; }
    $("cmReasons").innerHTML =
      '<div class="cm-rz bull"><div class="h">▲ 강세'+pl("bull")+'</div><div class="b">'+esc(r.bull||"")+'</div></div>'+
      '<div class="cm-rz base"><div class="h">● 기본'+pl("mid")+'</div><div class="b">'+esc(r.mid||"")+'</div></div>'+
      '<div class="cm-rz bear"><div class="h">▼ 약세'+pl("bear")+'</div><div class="b">'+esc(r.bear||"")+'</div></div>';

    $("chartModal").classList.add("show");
    $("cmScroll").scrollTop = 0;
    lockBody();
  }
  function mkDataset(label, data, color){
    return { label:label, data:data, borderColor:color, backgroundColor:color+"22",
      borderWidth:2.4, tension:.4, pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:color, fill:false };
  }
  function fmtNum(v, unit, axis){
    if(unit==="won"){
      if(axis) return "₩"+(v>=10000 ? (v/10000)+"만" : v);
      return "₩"+Number(v).toLocaleString();
    }
    return Number(v).toLocaleString();
  }
  var _scrollY = 0;
  function lockBody(){
    _scrollY = window.scrollY || window.pageYOffset || 0;
    document.body.style.position = "fixed";
    document.body.style.top = (-_scrollY) + "px";
    document.body.style.left = "0";
    document.body.style.right = "0";
    document.body.style.width = "100%";
  }
  function unlockBody(){
    document.body.style.position = "";
    document.body.style.top = "";
    document.body.style.left = "";
    document.body.style.right = "";
    document.body.style.width = "";
    window.scrollTo(0, _scrollY);
  }
  function closeChart(){
    $("chartModal").classList.remove("show");
    $("cmScroll").style.transform = "";
    $("cmScroll").style.transition = "";
    $("cmScroll").style.opacity = "";
    unlockBody();
    if(cmChart){ cmChart.destroy(); cmChart = null; }
  }

  /* 당겨서 닫기 (iOS 대응) — 차트 팝업 + 종목 상세 시트 공통 */
  function attachPullToClose(scrollEl, sheetEl, onClose){
    if(!scrollEl || !sheetEl) return;
    var startY=0, lastY=0, lastT=0, vel=0, dy=0, pulling=false;
    scrollEl.addEventListener("touchstart", function(e){
      if(scrollEl.scrollTop <= 2){
        startY=lastY=e.touches[0].clientY; lastT=Date.now(); vel=0; dy=0; pulling=true;
        sheetEl.style.transition="none";
      } else { pulling=false; }
    }, {passive:false});
    scrollEl.addEventListener("touchmove", function(e){
      if(!pulling) return;
      var y=e.touches[0].clientY; dy=y-startY;
      if(dy>0 && scrollEl.scrollTop<=2){
        e.preventDefault();
        var now=Date.now(), dt=now-lastT;
        if(dt>0) vel=(y-lastY)/dt;
        lastY=y; lastT=now;
        sheetEl.style.transform="translateY("+dy+"px)";
        sheetEl.style.opacity=String(Math.max(0.4, 1-dy/700));
      } else {
        pulling=false; sheetEl.style.transform=""; sheetEl.style.opacity="";
      }
    }, {passive:false});
    function end(){
      if(!pulling) return;
      pulling=false;
      sheetEl.style.transition="transform .24s ease, opacity .24s ease";
      if(dy>100 || vel>0.5){
        sheetEl.style.transform="translateY(100%)"; sheetEl.style.opacity="0";
        setTimeout(onClose, 200);
      } else {
        sheetEl.style.transform=""; sheetEl.style.opacity="";
      }
    }
    scrollEl.addEventListener("touchend", end);
    scrollEl.addEventListener("touchcancel", end);
  }
  // 차트 팝업: cmScroll을 당기면 닫힘
  attachPullToClose($("cmScroll"), $("cmScroll"), closeChart);
  attachPullToClose($("detailBody"), $("detailSheet"), closeSheets);
  // 헤더 핸들(제목 영역)을 잡고 내려도 닫힘 (스크롤 무관, 항상)
  (function(){
    var handle = $("detailHandle"), sheet = $("detailSheet");
    if(!handle || !sheet) return;
    var sY=0, lY=0, lT=0, v=0, dy=0, on=false;
    handle.addEventListener("touchstart", function(e){
      sY=lY=e.touches[0].clientY; lT=Date.now(); v=0; dy=0; on=true; sheet.style.transition="none";
    }, {passive:false});
    handle.addEventListener("touchmove", function(e){
      if(!on) return;
      var y=e.touches[0].clientY; dy=y-sY;
      if(dy>0){ e.preventDefault(); var now=Date.now(),dt=now-lT; if(dt>0)v=(y-lY)/dt; lY=y; lT=now;
        sheet.style.transform="translateY("+dy+"px)"; sheet.style.opacity=String(Math.max(.4,1-dy/700)); }
    }, {passive:false});
    function end(){
      if(!on) return; on=false;
      sheet.style.transition="transform .24s ease, opacity .24s ease";
      if(dy>90 || v>0.5){ sheet.style.transform="translateY(100%)"; sheet.style.opacity="0"; setTimeout(closeSheets,200); }
      else { sheet.style.transform=""; sheet.style.opacity=""; }
    }
    handle.addEventListener("touchend", end);
    handle.addEventListener("touchcancel", end);
  })();

  /* ---------- tabs / events ---------- */
  function syncTabs(){
    var tabs = $("tabs").querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle("active", tabs[i].getAttribute("data-tier")===state.tier); }
  }
  $("tabs").addEventListener("click", function(e){
    var t = e.target.closest(".tab"); if(!t) return;
    state.tier = t.getAttribute("data-tier");
    state.sector = "전체";
    syncTabs(); render();
  });
  $("search").addEventListener("input", function(e){ state.search = e.target.value; render(); });
  $("scrim").addEventListener("click", closeSheets);
  $("cmClose").addEventListener("click", closeChart);
  $("chartModal").addEventListener("click", function(e){
    if(e.target === $("chartModal") || e.target === $("cmScroll")) closeChart();
  });

  /* ---------- init ---------- */
  render();
})();
</script>
