<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0e14;
    --bg-soft:#121723;
    --panel:#161c2b;
    --panel-2:#1c2436;
    --line:#26314a;
    --txt:#e8edf7;
    --txt-dim:#8b97b0;
    --txt-faint:#5d6783;
    --accent:#5ad1a5;
    --accent-dim:#2f6f5a;
    --bull:#43c08a;
    --bear:#e5675f;
    --warn:#e8b85c;
    --radius:16px;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Pretendard",-apple-system,BlinkMacSystemFont,sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, #16243a 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #16312a 0%, transparent 55%),
      var(--bg);
    color:var(--txt);
    min-height:100vh;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 120px;}

  /* Header */
  header{
    position:sticky;top:0;z-index:30;
    padding:max(env(safe-area-inset-top),14px) 16px 12px;
    margin:0 -16px 8px;
    background:linear-gradient(180deg, rgba(11,14,20,.96) 60%, rgba(11,14,20,0));
    backdrop-filter:blur(8px);
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);}
  .brand h1{font-size:19px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .brand .sub{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-left:auto;letter-spacing:.04em;}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-top:14px;}
  .tab{
    flex:1;text-align:center;padding:10px 4px;border-radius:12px;
    background:var(--bg-soft);border:1px solid transparent;
    color:var(--txt-dim);font-size:13px;font-weight:700;cursor:pointer;
    transition:.18s;user-select:none;
  }
  .tab .cnt{display:block;font-family:var(--mono);font-size:10px;color:var(--txt-faint);margin-top:2px;font-weight:500;}
  .tab.active{background:var(--panel-2);border-color:var(--line);color:var(--txt);}
  .tab.active .cnt{color:var(--accent);}
  /* Sector filter bar */
  .sector-bar{display:flex;gap:6px;overflow-x:auto;margin-top:12px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .sector-bar::-webkit-scrollbar{display:none;}
  .schip{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--txt-dim);background:var(--panel);border:1px solid var(--line);padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .schip.on{background:rgba(90,209,165,.13);border-color:var(--accent-dim);color:var(--accent);}
  /* sector chip on card / detail */
  .card .sector-chip{font-size:10px;font-weight:700;color:var(--accent);background:rgba(90,209,165,.10);border:1px solid var(--accent-dim);padding:3px 8px;border-radius:20px;margin-right:6px;}
  .dv-head .sector-chip{font-size:11px;font-weight:700;color:var(--accent);background:rgba(90,209,165,.12);border:1px solid var(--accent-dim);padding:4px 10px;border-radius:20px;white-space:nowrap;margin-right:6px;}
  .sector-pick{display:flex;flex-wrap:wrap;gap:6px;}
  .sector-pick .opt{padding:8px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--txt-dim);cursor:pointer;}
  .sector-pick .opt.on{background:rgba(90,209,165,.12);border-color:var(--accent-dim);color:var(--accent);}
  /* chart button in detail */
  .chart-btn{width:100%;margin:14px 0 4px;padding:13px;border-radius:12px;background:linear-gradient(135deg,rgba(90,209,165,.18),rgba(90,209,165,.06));border:1px solid var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
  .chart-btn:active{transform:scale(.98);}
  /* chart modal */
  .chart-modal{position:fixed;inset:0;z-index:60;background:rgba(5,7,11,.78);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;}
  .chart-modal.show{display:block;}
  .cm-scroll{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:60px 0 0;}
  @media(min-width:680px){.cm-scroll{padding:40px 20px;}}
  .cm-card{width:100%;max-width:680px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:18px 16px calc(env(safe-area-inset-bottom) + 60px);min-height:60vh;}
  @media(min-width:680px){.cm-card{border-radius:20px;padding-bottom:28px;min-height:0;}}
  .cm-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
  .cm-title{font-size:17px;font-weight:800;}
  .cm-sub{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-top:2px;}
  .cm-close{margin-left:auto;font-size:24px;line-height:1;color:var(--txt-dim);background:none;border:none;cursor:pointer;padding:0 4px;}
  .cm-canvas-box{position:relative;height:300px;background:var(--bg-soft);border:1px solid var(--line);border-radius:14px;padding:12px 8px 6px;}
  .cm-legend{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0;}
  .cm-lg{flex:1;min-width:100px;border:1px solid var(--line);background:var(--panel-2);border-radius:9px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:7px;}
  .cm-lg.off{opacity:.35;}
  .cm-lg .d{width:10px;height:10px;border-radius:3px;}
  .cm-lg .n{font-size:11.5px;font-weight:600;}
  .cm-lg .p{font-family:var(--mono);font-size:10.5px;color:var(--txt-dim);margin-left:auto;}
  .cm-reasons{display:grid;gap:8px;}
  .cm-rz{border-radius:10px;padding:10px 12px;border:1px solid var(--line);background:var(--panel-2);border-left-width:3px;}
  .cm-rz.bull{border-left-color:var(--bull);}.cm-rz.base{border-left-color:var(--warn);}.cm-rz.bear{border-left-color:var(--bear);}
  .cm-rz .h{font-size:12px;font-weight:700;margin-bottom:3px;}
  .cm-rz.bull .h{color:var(--bull);}.cm-rz.base .h{color:var(--warn);}.cm-rz.bear .h{color:var(--bear);}
  .cm-rz .b{font-size:11.5px;color:var(--txt-dim);}
  .cm-note{font-size:11px;color:var(--txt-faint);margin-top:12px;line-height:1.6;}

  /* Search */
  .searchbar{margin-top:10px;position:relative;}
  .searchbar input{
    width:100%;padding:11px 14px 11px 38px;border-radius:12px;
    background:var(--bg-soft);border:1px solid var(--line);color:var(--txt);
    font-size:14px;font-family:inherit;outline:none;
  }
  .searchbar input::placeholder{color:var(--txt-faint);}
  .searchbar svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;}

  /* Cards */
  .list{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .card{
    background:linear-gradient(180deg,var(--panel),var(--bg-soft));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;cursor:pointer;transition:.16s;position:relative;overflow:hidden;
  }
  .card:active{transform:scale(.99);}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-dim);}
  .card .top{display:flex;align-items:baseline;gap:8px;}
  .card .nm{font-size:16px;font-weight:800;letter-spacing:-.01em;}
  .card .tk{font-family:var(--mono);font-size:11px;color:var(--txt-faint);}
  .card .tier-chip{margin-left:auto;font-size:10px;font-weight:700;color:var(--txt-dim);background:var(--panel-2);border:1px solid var(--line);padding:3px 8px;border-radius:20px;}
  .card .sm{font-size:13px;color:var(--txt-dim);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  .empty{text-align:center;color:var(--txt-faint);font-size:13px;padding:54px 20px;border:1px dashed var(--line);border-radius:var(--radius);margin-top:14px;}

  /* FAB */
  .fab{
    position:fixed;right:18px;bottom:max(env(safe-area-inset-bottom),22px);z-index:40;

      name: "유안타증권",
      ticker: "003470",
      tier: "mid",
      sector: "증권",
      summary: "고베타 중소형 증권주. 거래대금·강세장에 민감해 변동성 큼. 가장 싸지만(PBR 0.55) ROE도 낮은 딥밸류.",
      sections: [
        { title:"기업개요", body:"대만 유안타금융그룹이 55.34% 보유(외국계 최대주주). 시총 약 1조, 주가 5,110원. 외국인 비중 약 66%로 유통물량 적은 품절주. 52주 3,265~8,400원으로 변동 극심." },
        { title:"기술력", body:"(증권업) 매출의 약 45%가 위탁영업(브로커리지). 강세장·거래대금에 실적이 직결되는 구조. 범중화권 네트워크·중소형 IB가 특징." },
        { title:"실적", body:"2026 1Q 영업이익 728억(+464%), 순이익 680억(+643%). 2025년 연간 순이익의 71%를 한 분기에 달성. 거래대금 사상 최대(49조)로 2분기도 1분기 상회 가능성." },
        { title:"강세 요인", body:"거래대금 사상 최대 + 밸류업(저PBR 해소) + 고배당 3.86% + 자사주 624억 소각 + 배당 분리과세 우수형 요건 충족. 고베타라 강세장에 업종 평균보다 더 오름(5월 주간 +41%)." },
        { title:"약세 요인", body:"거래대금 의존도 높아 강세장 끝나면 직격탄. 정책 성장축(종투사·발행어음·IMA) 자기자본 미달로 배제. 외국계 모회사 보수적→자본 성장 천장. 커버리지 희박(목표가 사실상 없음)." },
        { title:"체크포인트", body:"① 일평균 거래대금 40조+ 유지 여부(30조 이하=피크아웃 신호)\n② 2분기 실적 1Q(728억) 상회 여부\n③ 신용융자·예탁금 급감(반대매매 경계)\n④ 한은 금리 결정·증시 분위기" }
      ],
      outlook: [
        { id: uid(), ts: Date.now(), title:"시장을 증폭하는 고베타주 (12개월 시나리오)",
          body:"강세(~7,500)=거래대금 40조+ 지속+2분기 실적 상회 / 기본(~5,600)=거래대금 30조대 등락, 고배당이 하방방어, 박스권 / 약세(~3,800)=거래대금 둔화+반대매매+증시조정(고베타라 낙폭 큼). 안정적 핵심은 한국금융지주가 더 합리적." }
      ],
      chart: {
        base: 5110, unit: "won",
        labels: ["26.6","26.7","26.8","26.9","26.10","26.11","26.12","27.1","27.2","27.3","27.4","27.5"],
        bull: [5110,5400,5900,6200,6500,6800,7000,7150,7250,7350,7430,7500],
        mid:  [5110,5050,5200,5350,5400,5450,5480,5500,5530,5560,5580,5600],
        bear: [5110,4900,4600,4400,4250,4150,4050,3980,3920,3870,3830,3800],
        reasons: {
          bull: "거래대금 40조+ 지속 + 2분기 실적이 1Q(728억) 상회 + 밸류업 ROE 10% 근접. 5월 고점(7,830) 재도전.",
          mid:  "거래대금 30조대 등락. 고배당(3.9%)+자사주 소각이 하방 방어. PBR 0.55 박스권.",
          bear: "거래대금 30조 아래 둔화(피크아웃) + 반대매매 + 증시 조정. 고베타라 낙폭 큼. 저점(3,265) 방향."
        }
      },
      updatedAt: Date.now()
    }];
  }

  /* ---------- helpers ---------- */
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]; }); }
  function $(id){ return document.getElementById(id); }

  function counts(){
    var c = { large:0, mid:0, small:0 };
    for(var i=0;i<companies.length;i++){ if(c[companies[i].tier]!=null) c[companies[i].tier]++; }
    return c;
  }

  /* ---------- sector filter bar ---------- */
  function renderSectorBar(){
    var bar = $("sectorBar");
    if(!bar) return;
    // 현재 tier에 존재하는 섹터만 칩으로 (+ 전체)
    var inTier = companies.filter(function(c){ return c.tier===state.tier; });
    var present = {};
    inTier.forEach(function(c){ present[c.sector||"기타"] = (present[c.sector||"기타"]||0)+1; });
    var list = ["전체"].concat(SECTORS.filter(function(s){ return present[s]; }));
    if(list.indexOf(state.sector) < 0) state.sector = "전체";
    bar.innerHTML = "";
    list.forEach(function(s){
      var chip = document.createElement("div");
      chip.className = "schip" + (s===state.sector ? " on" : "");
      chip.textContent = s==="전체" ? ("전체 "+inTier.length) : (s+" "+present[s]);
      chip.addEventListener("click", function(){ state.sector = s; render(); });
      bar.appendChild(chip);
    });
  }

  /* ---------- render list ---------- */
  function render(){
    var c = counts();
    $("c-large").textContent = c.large;
    $("c-mid").textContent = c.mid;
    $("c-small").textContent = c.small;
    $("totalCount").textContent = companies.length + " 종목";

    renderSectorBar();

    var q = state.search.trim().toLowerCase();
    var rows = companies.filter(function(x){
      if(x.tier !== state.tier) return false;
      if(state.sector !== "전체" && (x.sector||"기타") !== state.sector) return false;
      if(!q) return true;
      return (x.name||"").toLowerCase().indexOf(q) >= 0 || (x.ticker||"").toLowerCase().indexOf(q) >= 0;
    });

    var list = $("list");
    list.innerHTML = "";
    if(rows.length === 0){ $("empty").style.display = "block"; return; }
    $("empty").style.display = "none";

    rows.forEach(function(x){
      var el = document.createElement("div");
      el.className = "card";
      el.innerHTML =
        '<div class="top"><span class="nm">'+esc(x.name)+'</span>'+
        (x.ticker ? '<span class="tk">'+esc(x.ticker)+'</span>' : '')+
        '<span class="sector-chip" style="margin-left:auto;">'+esc(x.sector||"기타")+'</span>'+
        '<span class="tier-chip">'+TIER_LABEL[x.tier]+'</span></div>'+
        (x.summary ? '<div class="sm">'+esc(x.summary)+'</div>' : '');
      el.addEventListener("click", function(){ openDetail(x.id); });
      list.appendChild(el);
    });
  }

  /* ---------- sheets ---------- */
  function openSheet(node){ $("scrim").classList.add("show"); node.classList.add("show"); }
  function closeSheets(){
    $("scrim").classList.remove("show");
    $("detailSheet").classList.remove("show");
  }

  /* ---------- detail ---------- */
  function secClass(title){
    if(title.indexOf("강세")>=0) return "bull";
    if(title.indexOf("약세")>=0) return "bear";
    if(title.indexOf("체크")>=0) return "check";
    return "";
  }
  function fmtDate(ts){
    var d = new Date(ts || Date.now());
    var p = function(n){ return (n<10?"0":"")+n; };
    return d.getFullYear()+"."+p(d.getMonth()+1)+"."+p(d.getDate());
  }

  function openDetail(id){
    state.editingId = id;
    state.olAdding = false;
    if(!companies.find(function(c){ return c.id===id; })) return;
    renderDetail();
    openSheet($("detailSheet"));
  }

  function renderDetail(){
    var id = state.editingId;
    var x = companies.find(function(c){ return c.id===id; });
    if(!x) return;

    var html =
      '<div class="dv-head"><div><div class="nm">'+esc(x.name)+'</div>'+
      (x.ticker?'<div class="tk">'+esc(x.ticker)+'</div>':'')+'</div>'+
      '<span class="sector-chip">'+esc(x.sector||"기타")+'</span>'+
      '<span class="chip">'+TIER_LABEL[x.tier]+'</span></div>';
    if(x.summary) html += '<div class="dv-summary">'+esc(x.summary)+'</div>';

    /* 시나리오 차트 버튼 */
    if(x.chart){
      html += '<button class="chart-btn" id="openChart">\uD83D\uDCC8 12개월 시나리오 차트 보기</button>';
    }

    (x.sections||[]).forEach(function(s){
      if(!s.body && !s.title) return;
      html += '<div class="sec '+secClass(s.title||"")+'"><h3>'+esc(s.title)+'</h3><p>'+esc(s.body)+'</p></div>';
    });

    /* 앞으로 전망 (보기 전용) */
    var ol = x.outlook || [];
    if(ol.length){
      html += '<div class="ol-wrap"><div class="ol-head"><h3>\uD83D\uDCC8 앞으로 전망</h3></div>';
      for(var i=ol.length-1; i>=0; i--){
        var o = ol[i];
        html += '<div class="ol-item"><div class="meta">'+
          '<span class="num">#'+(i+1)+'</span>'+
          '<span class="date">'+fmtDate(o.ts)+'</span></div>'+
          '<div class="ol-title">'+esc(o.title||"")+'</div>'+
          (o.body ? '<div class="ol-body">'+esc(o.body)+'</div>' : '')+
          '</div>';
      }
      html += '</div>';
    }

    $("detailBody").innerHTML = html;

    /* 차트 열기 */
    var cb = $("openChart");
    if(cb){ cb.addEventListener("click", function(){ openChart(x); }); }
  }

  /* ---------- chart popup ---------- */
  var cmChart = null;
  function openChart(x){
    if(!x.chart) return;
    var ch = x.chart;
    $("cmTitle").textContent = x.name + " 시나리오";
    $("cmSub").textContent = "12개월 조건부 경로 · 기준 " + fmtNum(ch.base, ch.unit);

    var labels = ch.labels;
    var colors = { bull:"#43c08a", mid:"#e8b85c", bear:"#e5675f" };
    var datasets = [
      mkDataset("강세", ch.bull, colors.bull),
      mkDataset("기본", ch.mid, colors.mid),
      mkDataset("약세", ch.bear, colors.bear)
    ];

    if(cmChart){ cmChart.destroy(); cmChart = null; }
    var ctx = $("cmCanvas").getContext("2d");
    cmChart = new Chart(ctx, {
      type:"line",
      data:{ labels:labels, datasets:datasets },
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{ legend:{ display:false },
          tooltip:{ backgroundColor:"#1c2436", borderColor:"#26314a", borderWidth:1, padding:10, cornerRadius:8,
            callbacks:{ label:function(c){ return " "+c.dataset.label+": "+fmtNum(c.parsed.y, ch.unit); } } } },
        scales:{
          y:{ grid:{ color:"#1a2030" }, border:{ display:false },
            ticks:{ color:"#8b97b0", font:{ size:10 }, callback:function(v){ return fmtNum(v, ch.unit, true); } } },
          x:{ grid:{ display:false }, border:{ color:"#26314a" }, ticks:{ color:"#8b97b0", font:{ size:9 } } }
        }
      }
    });

    // legend
    var ends = { bull: ch.bull[ch.bull.length-1], mid: ch.mid[ch.mid.length-1], bear: ch.bear[ch.bear.length-1] };
    var names = [["강세",colors.bull,ends.bull,0],["기본",colors.mid,ends.mid,1],["약세",colors.bear,ends.bear,2]];
    var lg = $("cmLegend"); lg.innerHTML = "";
    names.forEach(function(n){
      var b = document.createElement("div"); b.className = "cm-lg";
      b.innerHTML = '<span class="d" style="background:'+n[1]+'"></span><span class="n">'+n[0]+'</span><span class="p">'+fmtNum(n[2], ch.unit)+'</span>';
      b.addEventListener("click", function(){
        var meta = cmChart.getDatasetMeta(n[3]); meta.hidden = !meta.hidden;
        b.classList.toggle("off", meta.hidden); cmChart.update();
      });
      lg.appendChild(b);
    });

    // reasons
    var r = ch.reasons || {};
    $("cmReasons").innerHTML =
      '<div class="cm-rz bull"><div class="h">▲ 강세</div><div class="b">'+esc(r.bull||"")+'</div></div>'+
      '<div class="cm-rz base"><div class="h">● 기본</div><div class="b">'+esc(r.mid||"")+'</div></div>'+
      '<div class="cm-rz bear"><div class="h">▼ 약세</div><div class="b">'+esc(r.bear||"")+'</div></div>';

    $("chartModal").classList.add("show");
    $("cmScroll").scrollTop = 0;
    lockBody();
  }
  function mkDataset(label, data, color){
    return { label:label, data:data, borderColor:color, backgroundColor:color+"22",
      borderWidth:2.4, tension:.4, pointRadius:0, pointHoverRadius:5, pointHoverBackgroundColor:color, fill:false };
  }
  function fmtNum(v, unit, axis){
    if(unit==="won"){
      if(axis) return "₩"+(v>=10000 ? (v/10000)+"만" : v);
      return "₩"+Number(v).toLocaleString();
    }
    return Number(v).toLocaleString();
  }
  var _scrollY = 0;
  function lockBody(){
    _scrollY = window.scrollY || window.pageYOffset || 0;
    document.body.style.position = "fixed";
    document.body.style.top = (-_scrollY) + "px";
    document.body.style.left = "0";
    document.body.style.right = "0";
    document.body.style.width = "100%";
  }
  function unlockBody(){
    document.body.style.position = "";
    document.body.style.top = "";
    document.body.style.left = "";
    document.body.style.right = "";
    document.body.style.width = "";
    window.scrollTo(0, _scrollY);
  }
  function closeChart(){
    $("chartModal").classList.remove("show");
    $("cmScroll").style.transform = "";
    $("cmScroll").style.transition = "";
    unlockBody();
    if(cmChart){ cmChart.destroy(); cmChart = null; }
  }

  /* 차트 팝업: 맨 위에서 아래로 강하게 당기면 닫기 */
  (function(){
    var sc = $("cmScroll");
    if(!sc) return;
    var startY = 0, curY = 0, pulling = false;
    sc.addEventListener("touchstart", function(e){
      // 스크롤이 맨 위에 있을 때만 당겨서 닫기 활성화
      if(sc.scrollTop <= 0){ startY = e.touches[0].clientY; curY = startY; pulling = true; sc.style.transition = "none"; }
      else { pulling = false; }
    }, {passive:true});
    sc.addEventListener("touchmove", function(e){
      if(!pulling) return;
      curY = e.touches[0].clientY;
      var dy = curY - startY;
      if(dy > 0){ sc.style.transform = "translateY("+dy+"px)"; }
      else { sc.style.transform = ""; }
    }, {passive:true});
    function end(){
      if(!pulling) return;
      pulling = false;
      var dy = curY - startY;
      sc.style.transition = "transform .22s ease";
      if(dy > 130){ closeChart(); }      // 강하게(130px+) 당기면 닫기
      else { sc.style.transform = ""; }  // 아니면 제자리
    }
    sc.addEventListener("touchend", end);
    sc.addEventListener("touchcancel", end);
  })();

  /* ---------- tabs / events ---------- */
  function syncTabs(){
    var tabs = $("tabs").querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle("active", tabs[i].getAttribute("data-tier")===state.tier); }
  }
  $("tabs").addEventListener("click", function(e){
    var t = e.target.closest(".tab"); if(!t) return;
    state.tier = t.getAttribute("data-tier");
    state.sector = "전체";
    syncTabs(); render();
  });
  $("search").addEventListener("input", function(e){ state.search = e.target.value; render(); });
  $("scrim").addEventListener("click", closeSheets);
  $("cmClose").addEventListener("click", closeChart);
  $("chartModal").addEventListener("click", function(e){
    if(e.target === $("chartModal") || e.target === $("cmScroll")) closeChart();
  });

  /* ---------- init ---------- */
  render();
})();
</script>
